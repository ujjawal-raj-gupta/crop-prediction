name: Agmarknet snapshot (Bihar mandis)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 2 * * *" # daily 02:30 UTC

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate snapshot
        env:
          AGMARKNET_API_KEY: ${{ secrets.AGMARKNET_API_KEY }}
          AGMARKNET_RESOURCE_ID: ${{ secrets.AGMARKNET_RESOURCE_ID }}
          AG_STATE: Bihar
          AG_LIMIT: "250"
          AG_TIMEOUT_S: "45"
          # Fewer commodities = faster run; expand via repo env later if needed.
          AG_COMMODITIES: "Wheat,Rice,Maize,Jute"
          AG_MAX_ATTEMPTS: "1"
        run: |
          if [ -z "$AGMARKNET_API_KEY" ]; then
            echo "ERROR: Missing GitHub Actions secret AGMARKNET_API_KEY"
            exit 1
          fi
          if [ -z "$AGMARKNET_RESOURCE_ID" ]; then
            echo "ERROR: Missing GitHub Actions secret AGMARKNET_RESOURCE_ID"
            exit 1
          fi
          echo "AGMARKNET_RESOURCE_ID=${AGMARKNET_RESOURCE_ID}"
          python scripts/agmarknet_snapshot.py

      - name: Commit snapshot if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/agmarknet_snapshot.json
          git commit -m "Update Agmarknet snapshot"
          git push

