services:
  - type: web
    name: smart-crop-advisor-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python train_model.py
    startCommand: gunicorn web_app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_PATH
        value: /tmp/smart_crop.db
